---
layout: default
---

<article class="page-content" data-animate style="--delay: 0s;">
  <header class="page-header">
    <h1>{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="page-subtitle">{{ page.subtitle }}</p>
    {% endif %}
  </header>
  <div class="content">
    {{ content }}
  </div>
</article>
